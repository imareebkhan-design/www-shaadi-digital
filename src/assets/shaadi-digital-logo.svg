<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 80" width="320" height="80">
  <defs>
    <!-- Gold gradient for .Digital -->
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#E8B84B"/>
      <stop offset="50%"  stop-color="#C9941A"/>
      <stop offset="100%" stop-color="#A87A10"/>
    </linearGradient>

    <!-- Subtle glow filter -->
    <filter id="glow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Decorative left ornament -->
  <g opacity="0.55">
    <line x1="8"  y1="40" x2="22" y2="40" stroke="#C9941A" stroke-width="0.8"/>
    <circle cx="26" cy="40" r="1.5" fill="#C9941A"/>
    <line x1="30" y1="40" x2="36" y2="40" stroke="#C9941A" stroke-width="0.8"/>
  </g>

  <!-- "Shaadi" in Maroon (Playfair Display style — serif paths) -->
  <text
    x="44"
    y="52"
    font-family="'Playfair Display', Georgia, 'Times New Roman', serif"
    font-size="36"
    font-weight="700"
    fill="#7B1C2E"
    letter-spacing="0.5"
    filter="url(#glow)"
  >Shaadi</text>

  <!-- ".Digital" in Gold gradient -->
  <text
    x="190"
    y="52"
    font-family="'Playfair Display', Georgia, 'Times New Roman', serif"
    font-size="36"
    font-weight="700"
    fill="url(#goldGrad)"
    letter-spacing="0.5"
  >.Digital</text>

  <!-- Decorative right ornament -->
  <g opacity="0.55">
    <line x1="284" y1="40" x2="290" y2="40" stroke="#C9941A" stroke-width="0.8"/>
    <circle cx="294" cy="40" r="1.5" fill="#C9941A"/>
    <line x1="298" y1="40" x2="312" y2="40" stroke="#C9941A" stroke-width="0.8"/>
  </g>

  <!-- Thin gold underline rule -->
  <line x1="44" y1="60" x2="276" y2="60" stroke="url(#goldGrad)" stroke-width="0.6" opacity="0.4"/>

  <!-- Tagline -->
  <text
    x="160"
    y="74"
    font-family="'DM Sans', 'Helvetica Neue', Arial, sans-serif"
    font-size="8"
    font-weight="400"
    fill="#6B5B4E"
    letter-spacing="3"
    text-anchor="middle"
    opacity="0.75"
  >DIGITAL WEDDING INVITATIONS</text>
</svg>
